<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery Basics - Chai Shop</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 700px; margin: 2rem; }
        .card { border: 1px solid #ccc; padding: 1rem; margin: 1rem 0; border-radius: 6px; }
        .highlight { background: #fff3cd; }
        .chai-type { font-weight: bold; color: #6b4226; }
    </style>
</head>
<body>

    <h1>Chai Shop</h1>
    <p class="tagline">Fresh brewed daily</p>

    <div id="menu">
        <div class="chai-item" data-price="250">Masala Chai</div>
        <div class="chai-item" data-price="200">Green Tea</div>
        <div class="chai-item" data-price="300">Turmeric Latte</div>
    </div>

    <button id="btn-order">Place Order</button>
    <button id="btn-highlight">Highlight First</button>
    <button id="btn-reset">Reset</button>

    <div id="output" class="card">Click a button to see result here.</div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>

        $(document).ready(function () {

            // --- Basic Selectors ---
            $("h1").css("color", "#6b4226");
            $(".tagline").css("font-style", "italic");
            $("#menu").css("border", "2px solid #ccc");

            // --- Click Event ---
            $("#btn-order").click(function () {
                var names = [];
                $(".chai-item").each(function () {
                    names.push($(this).text());
                });
                $("#output").text("You ordered: " + names.join(", "));
            });

            // --- CSS Class Manipulation ---
            $("#btn-highlight").click(function () {
                $(".chai-item:first").addClass("highlight");
            });

            // --- text() and html() ---
            $("#btn-reset").click(function () {
                $(".chai-item").removeClass("highlight");
                $("#output").html("Reset complete. <em>Ready for next order.</em>");
            });

            // --- val() on inputs (if any exist dynamically) ---

            // --- attr() reading ---
            $("#btn-order").on("click", function () {
                var firstPrice = $(".chai-item:first").attr("data-price");
                console.log("First item price attr:", firstPrice);
            });

            // --- data() reading (caches parsed value) ---
            $(".chai-item").click(function () {
                var price = $(this).data("price");
                var name = $(this).text();
                $("#output").text(name + " costs Rs " + price);
            });

            // --- css() getter and setter ---
            var bg = $(".card").css("background-color");
            console.log("Card background:", bg);

            // --- hover (mouseenter + mouseleave) ---
            $(".chai-item").hover(
                function () { $(this).css("background", "#f5f0e8"); },
                function () { $(this).css("background", ""); }
            );

        });

    </script>
</body>
</html>
